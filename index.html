<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tutto Torna Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @font-face { font-family: 'JetBrains Mono'; src: local('JetBrains Mono'); }
    html { overflow-y: scroll; }
    body { margin: 0; }
    a { color: inherit; text-decoration: none; }
    a:hover { opacity: 0.6; }
    ::selection { background: #111; color: #f4f4f4; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Archivo+Black&display=swap" rel="stylesheet">
 <link rel="icon" type="image/png" href="./assets/favicon.png">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Tutto Torna Studio",
  "url": "https://www.tuttotornastudio.it",
  "description": "Studio di brand e visual identity con sede tra Torino e Asti",
  "sameAs": [
    "https://instagram.com/tuttotornastudio"
  ]
}
</script>
</helmet>
<div style="min-height:100vh; width:100%; background:{{ bg }}; color:{{ fg }}; font-family:'JetBrains Mono', monospace; display:flex; flex-direction:column; box-sizing:border-box; padding:clamp(16px,3vw,32px); transition:background 0.5s ease, color 0.5s ease; position:relative; overflow:hidden;">

  <div style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:8px 16px; height:clamp(24px,3vw,34px); padding-bottom:clamp(12px,2vw,20px); font-size:clamp(11px,1.1vw,14px); letter-spacing:0.02em;">
    <div style="flex:1 1 auto; min-width:0;">{{ clock }}</div>
    <a href="./about.html" style="white-space:nowrap; padding:2px 8px; margin:-2px -8px; transition:background 0.2s ease, color 0.2s ease;" style-hover="background:{{ fg }}; color:{{ bg }};">{{ t.ctaAbout }}</a>
    <div style="flex:1 1 auto; min-width:0; text-align:right; display:flex; gap:16px; justify-content:flex-end;">
      <a href="https://instagram.com/tuttotornastudio" target="_blank" rel="noopener" style="padding:2px 8px; margin:-2px -8px; transition:background 0.2s ease, color 0.2s ease;" style-hover="background:{{ fg }}; color:{{ bg }};">IG</a>
      <a href="mailto:info@tuttotornastudio.it" style="padding:2px 8px; margin:-2px -8px; transition:background 0.2s ease, color 0.2s ease;" style-hover="background:{{ fg }}; color:{{ bg }};">MAIL</a>
      <div style="position:relative;">
        <button onClick="{{ toggleThemePanel }}" aria-label="Seleziona tema colore" style="width:1.1em; height:1.1em; border-radius:50%; border:none; background:{{ fg }}; cursor:pointer; padding:0; display:block; font-size:clamp(11px,1.1vw,14px);"></button>
        <sc-if value="{{ themePanelOpen }}">
          <div onClick="{{ toggleThemePanel }}" style="position:fixed; inset:0; z-index:9;"></div>
          <div style="position:absolute; top:calc(100% + 12px); right:0; z-index:10; display:grid; grid-template-columns:repeat(4, 32px); gap:12px; width:max-content; padding:16px; border-radius:20px; background:color-mix(in srgb, {{ bg }} 55%, transparent); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid color-mix(in srgb, {{ fg }} 25%, transparent); box-shadow:0 8px 32px color-mix(in srgb, {{ fg }} 18%, transparent);">
            <sc-for list="{{ themePalettes }}" as="p" hint-placeholder-count="8">
              <button onClick="{{ p.select }}" title="{{ p.bg }} / {{ p.fg }}" style="box-sizing:border-box; width:32px; height:32px; border-radius:50%; border:1.5px solid {{ fg }}; background:radial-gradient(circle at 28% 25%, {{ p.fg }}, transparent 65%), radial-gradient(circle at 72% 80%, {{ p.bg }}, transparent 65%), {{ p.bg }}; background-clip:padding-box; cursor:pointer; padding:0;"></button>
            </sc-for>
          </div>
        </sc-if>
      </div>
    </div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%; gap:clamp(4px,0.8vw,10px);">

  <div style="display:flex; flex-wrap:wrap; justify-content:space-between; gap:8px; align-items:flex-end; width:100%; font-size:clamp(11px,1.1vw,14px); letter-spacing:0.02em; line-height:1.4;">
    <div>{{ t.weAre1 }}</div>
    <div style="text-align:right;">{{ t.claim }}</div>
  </div>

  <div style="display:flex; align-items:center; justify-content:center; width:100%;">
    <svg onClick="{{ toggleInvert }}" viewBox="0 0 1734.89 239.11" style="width:100%; height:auto; color:{{ fg }}; transition:color 0.5s ease; cursor:pointer;" aria-label="Tutto Torna Studio" role="img">
      <path fill="currentColor" d="M88.28,103v80.92c0,4.07,3.31,7.36,7.36,7.36h44.14v44.14h-44.14c-28.44,0-51.5-23.06-51.5-51.5v-80.92H0v-44.14h44.14V0h44.14v58.86h51.5v44.14h-51.5Z"></path>
      <path fill="currentColor" d="M207.4,150.83c0,24.38,19.76,44.14,44.14,44.14s44.14-19.76,44.14-44.14V58.87h44.14v91.96c0,48.76-39.52,88.28-88.28,88.28s-88.28-39.52-88.28-88.28V58.87h44.14v91.96Z"></path>
      <path fill="currentColor" d="M444.01,103v80.92c0,4.07,3.31,7.36,7.36,7.36h44.14v44.14h-44.14c-28.44,0-51.5-23.06-51.5-51.5v-80.92h-44.14v-44.14h44.14V0h44.14v58.86h51.5v44.14h-51.5Z"></path>
      <path fill="currentColor" d="M597.53,103v80.92c0,4.07,3.31,7.36,7.36,7.36h44.14v44.14h-44.14c-28.44,0-51.5-23.06-51.5-51.5v-80.92h-44.14v-44.14h44.14V0h44.14v58.86h51.5v44.14h-51.5Z"></path>
      <path fill="currentColor" d="M845.57,147.14c0,50.79-41.16,91.96-91.96,91.96s-91.96-41.17-91.96-91.96,41.16-91.96,91.96-91.96,91.96,41.17,91.96,91.96ZM801.43,147.14c0-26.41-21.41-47.82-47.82-47.82s-47.82,21.41-47.82,47.82,21.41,47.82,47.82,47.82,47.82-21.41,47.82-47.82Z"></path>
      <path fill="currentColor" d="M942.77,103v80.92c0,4.07,3.31,7.36,7.36,7.36h44.14v44.14h-44.14c-28.44,0-51.5-23.06-51.5-51.5v-80.92h-44.14v-44.14h44.14V0h44.14v58.86h51.5v44.14h-51.5Z"></path>
      <path fill="currentColor" d="M1190.82,147.14c0,50.79-41.16,91.96-91.96,91.96s-91.96-41.17-91.96-91.96,41.16-91.96,91.96-91.96,91.96,41.17,91.96,91.96ZM1146.67,147.14c0-26.41-21.41-47.82-47.82-47.82s-47.82,21.41-47.82,47.82,21.41,47.82,47.82,47.82,47.82-21.41,47.82-47.82Z"></path>
      <path fill="currentColor" d="M1333.04,58.86v44.14h-36.79c-24.39,0-44.14,19.76-44.14,44.14v88.28h-44.14v-88.28c0-48.76,39.54-88.28,88.28-88.28h36.79Z"></path>
      <path fill="currentColor" d="M1486.06,143.4c0-24.38-19.76-44.14-44.14-44.14s-44.14,19.76-44.14,44.14v91.96h-44.14v-91.96c0-48.76,39.52-88.28,88.28-88.28s88.28,39.52,88.28,88.28v91.96h-44.14v-91.96Z"></path>
      <path fill="currentColor" d="M1734.89,147.14v88.28h-44.14v-9.72c-13.93,8.5-30.3,13.4-47.82,13.4-50.79,0-91.96-41.17-91.96-91.96s41.17-91.96,91.96-91.96,91.96,41.17,91.96,91.96ZM1690.75,147.14c0-26.41-21.41-47.82-47.82-47.82s-47.82,21.41-47.82,47.82,21.41,47.82,47.82,47.82,47.82-21.41,47.82-47.82Z"></path>
    </svg>
  </div>

  <div style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-start; width:100%; font-size:clamp(11px,1.1vw,14px); letter-spacing:0.02em; line-height:1.4;">
    <div style="cursor:default; position:relative;" onMouseEnter="{{ onCoordsEnter }}" onMouseLeave="{{ onCoordsLeave }}">
      <span style="visibility:hidden;">{{ t.basedIn1 }}</span>
      <span style="position:absolute; top:0; left:0; white-space:nowrap;">{{ basedInDisplay }}</span>
    </div>
    <div style="text-align:right; cursor:default; position:relative;" onMouseEnter="{{ onCanelliEnter }}" onMouseLeave="{{ onCanelliLeave }}">
      <span style="visibility:hidden;">44.7167° N, 8.2833° E</span>
      <span style="position:absolute; top:0; right:0; white-space:nowrap;">{{ canelliDisplay }}</span>
    </div>
  </div>

  </div>

  <div style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; width:100%; padding-top:clamp(12px,2vw,20px); font-size:clamp(11px,1.1vw,14px); letter-spacing:0.02em;">
    <div>Tutto Torna Studio</div>
    <button onClick="{{ toggleInvert }}" style="background:none; border:none; color:{{ fg }}; font-family:'JetBrains Mono', monospace; font-size:inherit; letter-spacing:inherit; cursor:pointer; padding:0; white-space:nowrap;" style-hover="opacity:0.6;">{{ t.changeOutfit }}</button>
    <button onClick="{{ toggleLang }}" style="background:none; border:none; color:{{ fg }}; font-family:'JetBrains Mono', monospace; font-size:inherit; letter-spacing:inherit; cursor:pointer; padding:0;" style-hover="opacity:0.6;">({{ t.langToggleLabel }})</button>
    <div>2026</div>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { time: new Date(), lang: 'it', paletteIdx: 0, coordsHover: false, canelliHover: false, themePanelOpen: false };

  toggleThemePanel = () => this.setState(s => ({ themePanelOpen: !s.themePanelOpen }));

  selectPalette = i => {
    this.setState({ paletteIdx: i, themePanelOpen: false });
    localStorage.setItem('ttsPaletteIdx', String(i));
  };

  onCoordsEnter = () => this.setState({ coordsHover: true });
  onCoordsLeave = () => this.setState({ coordsHover: false });

  onCanelliEnter = () => this.setState({ canelliHover: true });
  onCanelliLeave = () => this.setState({ canelliHover: false });

  translations = {
    it: { weAre1: 'Studio Creativo', basedIn1: '45.0703° N, 7.6869° E', claim: 'Brand & Visual Identity', langToggleLabel: 'EN', ctaAbout: 'Chi siamo ↗', changeOutfit: 'Cambia Outfit ↗' },
    en: { weAre1: 'Creative Studio', basedIn1: '45.0703° N, 7.6869° E', claim: 'Brand & Visual Identity', langToggleLabel: 'IT', ctaAbout: 'About ↗', changeOutfit: 'Change Outfit ↗' }
  };

  palettes = [
    { bg: 'oklch(0.97 0 0)', fg: 'oklch(0.22 0 0)' },
    { bg: 'oklch(0.22 0 0)', fg: 'oklch(0.97 0 0)' },
    { bg: '#3E2723', fg: '#F4C9D6' },
    { bg: '#42047e', fg: '#07f49e' },
    { bg: '#696eff', fg: '#f8acff' },
    { bg: '#FF1637', fg: '#491507' },
    { bg: '#FEB6C6', fg: '#2B4321' },
    { bg: '#FFF2BA', fg: '#0F3C65' }
  ];

  componentDidMount() {
    this._tick = setInterval(() => this.setState({ time: new Date() }), 1000);
    this.setState({
      paletteIdx: parseInt(localStorage.getItem('ttsPaletteIdx'), 10) || 0,
      lang: localStorage.getItem('ttsLang') === 'en' ? 'en' : 'it'
    });
  }
  componentWillUnmount() {
    clearInterval(this._tick);
  }

  toggleInvert = () => {
    this.setState(s => {
      const paletteIdx = (s.paletteIdx + 1) % this.palettes.length;
      localStorage.setItem('ttsPaletteIdx', String(paletteIdx));
      return { paletteIdx };
    });
  };

  toggleLang = () => {
    this.setState(s => {
      const lang = s.lang === 'it' ? 'en' : 'it';
      localStorage.setItem('ttsLang', lang);
      return { lang };
    });
  };

  formatClock(d, lang) {
    const daysIt = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    const daysEn = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const pad = n => String(n).padStart(2, '0');
    const day = (lang === 'en' ? daysEn : daysIt)[d.getDay()];
    const date = lang === 'en'
      ? `${pad(d.getMonth() + 1)}.${pad(d.getDate())}`
      : `${pad(d.getDate())}.${pad(d.getMonth() + 1)}`;
    const time = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    return `${day}, ${date} — ${time}`;
  }

  renderVals() {
    const { bg, fg } = this.palettes[this.state.paletteIdx];
    return {
      bg,
      fg,
      clock: this.formatClock(this.state.time, this.state.lang),
      toggleLang: this.toggleLang,
      toggleInvert: this.toggleInvert,
      onCoordsEnter: this.onCoordsEnter,
      onCoordsLeave: this.onCoordsLeave,
      basedInDisplay: this.state.coordsHover ? (this.state.lang === 'en' ? 'Turin, Italy' : 'Torino, Italia') : this.translations[this.state.lang].basedIn1,
      onCanelliEnter: this.onCanelliEnter,
      onCanelliLeave: this.onCanelliLeave,
      canelliDisplay: this.state.canelliHover ? (this.state.lang === 'en' ? 'Canelli, Italy' : 'Canelli, Italia') : '44.7167° N, 8.2833° E',
      themePanelOpen: this.state.themePanelOpen,
      toggleThemePanel: this.toggleThemePanel,
      themePalettes: this.palettes.map((p, i) => ({ bg: p.bg, fg: p.fg, select: () => this.selectPalette(i) })),
      t: this.translations[this.state.lang]
    };
  }
}

</script>
</body>
</html>

      <span>{{ t.s1 }}</span><span>|</span><span>{{ t.s2 }}</span><span>|</span><span>{{ t.s3 }}</span><span>|</span><span>{{ t.s4 }}</span><span>|</span>

    <div>Tutto Torna Studio</div>
    <div>2026</div>
  </div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { time: new Date(), paletteIdx: 0, lang: 'it' };

  palettes = [
    { bg: 'oklch(0.97 0 0)', fg: 'oklch(0.22 0 0)', stripe: 'oklch(0.94 0 0)' },
    { bg: 'oklch(0.22 0 0)', fg: 'oklch(0.97 0 0)', stripe: 'oklch(0.32 0 0)' },
    { bg: '#f89b29', fg: '#ff0f7b', stripe: '#ffb457' },
    { bg: '#42047e', fg: '#07f49e', stripe: '#5a1a94' },
    { bg: '#696eff', fg: '#f8acff', stripe: '#8388ff' },
    { bg: '#ebf4f5', fg: '#b5c6e0', stripe: '#dbe9ea' }
  ];

  translations = {
    it: { moodboard: 'moodboard studio — da inserire', intro: 'Siamo uno studio di brand e visual identity con sede a Torino. Costruiamo sistemi visivi coerenti, essenziali, pensati per durare — dove ogni segno torna, si ripete, si riconosce.', s1: 'DESIGN', s2: 'BRANDING', s3: 'COMUNICAZIONE', s4: 'STRATEGY' },
    en: { moodboard: 'studio moodboard — to be added', intro: 'We are a brand and visual identity studio based in Turin. We build visual systems that are coherent, essential, made to last — where every mark comes back, repeats, is recognised.', s1: 'DESIGN', s2: 'BRANDING', s3: 'COMMUNICATION', s4: 'STRATEGY' }
  };

  componentDidMount() {
    this._tick = setInterval(() => this.setState({ time: new Date() }), 1000);
    this.setState({
      paletteIdx: parseInt(localStorage.getItem('ttsPaletteIdx'), 10) || 0,
      lang: localStorage.getItem('ttsLang') === 'en' ? 'en' : 'it'
    });
  }
  componentWillUnmount() {
    clearInterval(this._tick);
  }

  cyclePalette = () => {
    this.setState(s => {
      const paletteIdx = (s.paletteIdx + 1) % this.palettes.length;
      localStorage.setItem('ttsPaletteIdx', String(paletteIdx));
      return { paletteIdx };
    });
  };

  formatClock(d, lang) {
    const daysIt = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    const daysEn = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const pad = n => String(n).padStart(2, '0');
    const day = (lang === 'en' ? daysEn : daysIt)[d.getDay()];
    const date = lang === 'en'
      ? `${pad(d.getMonth() + 1)}.${pad(d.getDate())}`
      : `${pad(d.getDate())}.${pad(d.getMonth() + 1)}`;
    return `${day}, ${date} — ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  renderVals() {
    const { bg, fg, stripe } = this.palettes[this.state.paletteIdx];
    return {
      clock: this.formatClock(this.state.time, this.state.lang),
      bg,
      fg,
      stripeColor: stripe,
      cyclePalette: this.cyclePalette,
      t: this.translations[this.state.lang]
    };
  }
}

</script>
</body>
</html>
